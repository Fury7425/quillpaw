name: tauri-build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      # usearch is pinned to =2.16.0 in Cargo.toml because later versions use
      # the `#warning` preprocessor directive which MSVC does not support
      # (fatal error C1021). This step updates the lock file to reflect the pin
      # before the main build runs.
      - name: Update usearch in lock file
        run: cargo update -p usearch
        working-directory: src-tauri
      - name: Install frontend dependencies
        run: npm install
      - name: Build Tauri app
        run: npm run tauri -- build
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: quillpaw-windows
          path: |
            src-tauri/target/release/bundle/**name: tauri-build

