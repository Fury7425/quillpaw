name: Tauri Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-2022
    env:
      RUSTFLAGS: "-C link-arg=/FORCE:MULTIPLE"
      CFLAGS: "/MD"
      CXXFLAGS: "/MD"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.8
        with:
          version: "v0.8.1"
        continue-on-error: true

      - name: Verify sccache or disable it
        shell: bash
        run: |
          if sccache --start-server 2>/dev/null; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          else
            echo "sccache unavailable, disabling RUSTC_WRAPPER"
          fi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Enable VBScript (Required for WiX v3)
        run: DISM /online /enable-feature /featurename:VBScript /all /norestart
        shell: powershell
        continue-on-error: true

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        shell: bash
        run: npm run tauri -- build 2>&1 | tee build.log

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: quillpaw-windows
          path: src-tauri/target/release/bundle/**
