name: Tauri Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        shell: bash
        run: npm run tauri -- build 2>&1 | tee build.log
        continue-on-error: true

      - name: Upload build log
        if: always()
        shell: bash
        run: |
          URL=$(curl -s -X POST -F "f=@build.log" https://paste.c-net.org/)
          echo "::error::Build log available at $URL"
          [ -s build.log ] || echo "Build log is empty"
          exit 1

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: quillpaw-windows
          path: |
            src-tauri/target/release/bundle/**
